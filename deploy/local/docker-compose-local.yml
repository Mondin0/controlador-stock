services:
  controlador:
    build: ./deploy/local/
    volumes:
      - ./back:/var/www/html
      - ./deploy/local/php-fpm.conf:/usr/local/etc/php-fpm.d/zzz-custom.conf:ro
    depends_on:
      - postgres
  nginx:
    # Nginx solo
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./back:/var/www/html:ro
      - ./deploy/local/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - controlador

  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=controlador
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/local/postgres/pg_hba.conf:/var/lib/postgresql/data/pg_hba.conf:ro # ← Ruta correcta
    command: postgres -c 'hba_file=/var/lib/postgresql/data/pg_hba.conf'

volumes:
  postgres_data:
